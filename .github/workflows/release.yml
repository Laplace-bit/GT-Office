name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.7'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            build_args: ''
            allow_unsigned_macos_bundle: '1'
          - os: windows-latest
            platform: windows
            build_args: '--bundles nsis'
            allow_unsigned_macos_bundle: '0'
          - os: ubuntu-latest
            platform: linux
            build_args: '--bundles appimage,deb'
            allow_unsigned_macos_bundle: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run typecheck

      - name: Ensure skill resources exist
        shell: bash
        run: mkdir -p .codex/skills/gto-agent-communication/agents

      - name: Rust check
        run: cargo check --workspace

      - name: Build desktop bundle
        shell: bash
        env:
          CARGO_TERM_COLOR: always
          NODE_OPTIONS: '--max-old-space-size=4096'
          GTO_ALLOW_UNSIGNED_MACOS_BUNDLE: ${{ matrix.allow_unsigned_macos_bundle }}
          GTO_ENABLE_UPDATER_ARTIFACTS: '1'
          GTO_UPDATER_PUBKEY: ${{ vars.GTO_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.build_args }}" ]; then
            node scripts/run-tauri-with-env.cjs build ${{ matrix.build_args }}
          else
            node scripts/run-tauri-with-env.cjs build
          fi

      - name: Prepare release assets
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.tag || github.ref_name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          assets_dir="release-assets"
          rm -rf "$assets_dir"
          mkdir -p "$assets_dir"

          if [ "${{ matrix.platform }}" = "macos" ]; then
            app_bundle=$(find target/macos/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)
            if [ -z "$app_bundle" ]; then
              echo "Expected macOS app bundle was not produced."
              exit 1
            fi
            zip_name="GT-Office-${version}-macos.zip"
            /usr/bin/ditto -c -k --keepParent "$app_bundle" "$assets_dir/$zip_name"

            dmg_file=$(find target/macos/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1 || true)
            if [ -n "$dmg_file" ]; then
              cp "$dmg_file" "$assets_dir/$(basename "$dmg_file")"
            else
              echo "Expected macOS DMG was not produced."
              exit 1
            fi
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              cp "$file" "$assets_dir/$(basename "$file")"
            done < <(find target/windows/release/bundle -type f \( -name '*.exe' -o -name '*.msi' \))
          else
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              cp "$file" "$assets_dir/$(basename "$file")"
            done < <(find target/linux/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \))
          fi

          while IFS= read -r sig_file; do
            [ -n "$sig_file" ] || continue
            asset_file="${sig_file%.sig}"
            if [ -f "$asset_file" ]; then
              cp "$asset_file" "$assets_dir/$(basename "$asset_file")"
            fi
            cp "$sig_file" "$assets_dir/$(basename "$sig_file")"
          done < <(find "target/${{ matrix.platform }}/release/bundle" -type f -name '*.sig')

          ls -la "$assets_dir"

          case "${{ matrix.platform }}" in
            macos)
              arch="$(uname -m)"
              target_os="darwin"
              ;;
            windows)
              arch="x86_64"
              target_os="windows"
              ;;
            *)
              arch="$(uname -m)"
              target_os="linux"
              ;;
          esac

          case "$arch" in
            arm64)
              arch="aarch64"
              ;;
            amd64|x64)
              arch="x86_64"
              ;;
          esac

          if find "$assets_dir" -maxdepth 1 -type f -name '*.sig' | grep -q .; then
            node scripts/release/generate-updater-platform-manifest.cjs \
              --assets-dir "$assets_dir" \
              --output "$assets_dir/updater-manifest-${{ matrix.platform }}.json" \
              --os "$target_os" \
              --arch "$arch" \
              --repo "$REPO_SLUG" \
              --tag "$VERSION"
          else
            echo "No signed updater artifacts found for ${{ matrix.platform }}; skipping updater manifest generation."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v4

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Summarize release assets
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Generate updater manifest
        env:
          VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          if find release-assets -maxdepth 1 -type f -name 'updater-manifest-*.json' | grep -q .; then
            node scripts/release/merge-updater-manifests.cjs \
              --input-dir release-assets \
              --output release-assets/latest.json \
              --version "$version" \
              --notes-file "docs/releases/${VERSION}.md"
            rm -f release-assets/updater-manifest-*.json
          else
            echo "No updater manifests found; skipping latest.json generation."
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: docs/releases/${{ github.event.inputs.tag || github.ref_name }}.md
          files: release-assets/**/*
