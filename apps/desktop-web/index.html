<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const root = document.documentElement
        const storageKey = 'gtoffice.ui.preferences.v1'
        let themeMode = 'graphite-dark'
        try {
          const raw = window.localStorage.getItem(storageKey)
          if (raw) {
            const parsed = JSON.parse(raw)
            if (parsed?.themeMode === 'graphite-dark' || parsed?.themeMode === 'graphite-light') {
              themeMode = parsed.themeMode
            }
          }
        } catch {}
        root.dataset.theme = themeMode
        root.style.backgroundColor = themeMode === 'graphite-dark' ? '#000000' : '#f5f5f7'
        root.style.colorScheme = themeMode === 'graphite-dark' ? 'dark' : 'light'
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:wght@300..700&family=Fira+Code:wght@300..700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300..800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>desktop-web</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
